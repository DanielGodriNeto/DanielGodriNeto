  <style>
    svg { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 14px; color: #777 }
    h1,h2,h3 { margin: 8px 0 2px; padding: 0; color: #0366d6 }
    h1 { font-size: 20px; font-weight: 700 }
    h2 { font-size: 16px; font-weight: 400 }
    h3 { font-size: 14px; font-weight: 400 }
    h1 svg, h2 svg, h3 svg { fill: currentColor }
    section > .field { margin-left: 5px; margin-right: 5px }
    .field { display: flex; align-items: center; margin-bottom: 2px; white-space: nowrap }
    .field svg { margin: 0 8px; fill: #959da5; flex-shrink: 0 }
    .row { display: flex; flex-wrap: wrap }
    .row section { flex: 1 1 0 }
    .column { display: flex; flex-direction: column; align-items: center }
    .center { justify-content: center }
    .horizontal-wrap { flex-wrap: wrap }
    .no-wrap { white-space: nowrap }
    .fill-width { width: 100% }
    .avatar { border-radius: 50%; margin: 0 6px }
    .calendar.field { margin: 4px 0 4px 7px }
    .calendar .day { outline: 1px solid rgba(27,31,35,.04); outline-offset: -1px }
    svg.bar { margin: 4px 0 }
    .field.language { margin: 0 8px; flex-grow: 0 }
    footer { margin-top: 8px; font-size: 10px; font-style: italic; color: #666; text-align: right; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 4px }
    .blue { color: #58a6ff }
    :root {
      --color-calendar-graph-day-bg: #ebedf0;
      --color-calendar-graph-day-L1-bg: #9be9a8;
      --color-calendar-graph-day-L2-bg: #40c463;
      --color-calendar-graph-day-L3-bg: #30a14e;
      --color-calendar-graph-day-L4-bg: #216e39;
    }
  </style>
