O SVG que você mandou foi gerado pelo lowlighter/metrics — uma GitHub Action que atualiza o arquivo automaticamente a cada push ou em horário agendado. Vou criar o arquivo de workflow pra você!


Created a file, read a file
Created a file, read a file
Agora é só seguir esses passos para funcionar:

1. Criar o token do GitHub Vai em github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) e cria um com a permissão read:user.

2. Adicionar o token no repositório No repositório DanielGodriNeto/DanielGodriNeto, vai em Settings → Secrets and variables → Actions → New repository secret, cria um secret chamado METRICS_TOKEN e cola o token lá.

3. Colocar o arquivo no repositório Cria a pasta .github/workflows/ na raiz do repositório e coloca esse metrics.yml dentro.

A partir daí o github-metrics.svg vai ser gerado automaticamente a cada push e todo dia à meia-noite. O README já está apontando para ./github-metrics.svg, então vai aparecer direto no seu perfil!


