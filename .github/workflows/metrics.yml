Identificou pergunta simples sobre adicionar pasta
Identificou pergunta simples sobre adicionar pasta
No GitHub, você não consegue criar uma pasta vazia diretamente — ela precisa ter pelo menos um arquivo dentro. Tem duas formas:

Pelo site do GitHub:

Abre o repositório DanielGodriNeto/DanielGodriNeto
Clica em "Add file" → "Create new file"
No campo do nome do arquivo, digita o caminho completo: .github/workflows/metrics.yml
O GitHub cria as pastas automaticamente conforme você digita as barras /
Cola o conteúdo do arquivo e clica em "Commit changes"
Pelo VS Code / computador:

Cria a pasta .github/workflows/ normalmente no explorador de arquivos
Coloca o metrics.yml dentro
Faz o commit e push normalmente
A primeira opção é mais fácil se você não usa Git no computador ainda!






