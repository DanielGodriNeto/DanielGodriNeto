name: Metrics
on:
  # Schedule updates (daily at midnight)
  schedule:
    - cron: "0 0 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Run on every push to main or master
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub personal access token stored in repository secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Core Options
          user: eljobe
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Zurich

          # Achievements Plugin
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_ignored: explorer, gister, helper
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # Repositories Traffic Plugin
          plugin_traffic: yes

          # Coding Languages Plugin
          plugin_languages: yes

          # StackOverflow Integration
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 95724

          # Followup / Issues & PRs Plugin
          plugin_followup: yes
          plugin_followup_indepth: yes

          # Calendar (Explicitly disabled per your reference)
          plugin_isocalendar: no
