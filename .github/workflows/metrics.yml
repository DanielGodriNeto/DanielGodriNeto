# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics
on:
  # Schedule updates (daily)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          #  - repo
          # The following additional scopes may be required:
          #  - read:org  (for organization related metrics)
          #  - read:user (for user related data)
          #  - repo      (optional, if you want to include private repositories)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: DanielGodriNeto
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # Achievements Plugin
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_ignored: explorer, gister, helper
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          # Isometric Calendar (Turned off exactly like his)
          plugin_isocalendar: no
          
          # Traffic Plugin (Shows views/traffic on your repositories)
          plugin_traffic: yes
          
          # Languages Plugin
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          
          # Followup Plugin (Calculates in-depth Issues & Pull Requests metrics)
          plugin_followup: yes
          plugin_followup_indepth: yes

          # StackOverflow Plugin (Optional)
          # If you have a StackOverflow account and want your score/badges to display here, 
          # uncomment the lines below and change '95724' to your own StackOverflow User ID!
          # plugin_stackoverflow: yes
          # plugin_stackoverflow_user: 95724
