name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"       # Updates every day at midnight (UTC)
  workflow_dispatch:          # Allows you to run manually from the Actions tab
  push:
    branches: ["main"]        # Updates on every push to the main branch

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # Profile configuration
          user: DanielGodriNeto
          template: classic
          
          # "base" controls what core stats are shown in the main card layout.
          # Including 'header', 'repositories', and 'metadata' adds your avatar, description, and totals.
          base: header, repositories, metadata

          # PLUGINS & ADDITIONAL FEATURES:

          # Languages breakdown plugin
          plugin_languages: yes
          plugin_languages_limit: 4
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

          # Followup plugin: Displays accurate stats for Issues and Pull Requests
          plugin_followup: yes
          plugin_followup_sections: repositories, user

          # Recent Activity plugin (Shows recent commits, issues, and PR interactions)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
