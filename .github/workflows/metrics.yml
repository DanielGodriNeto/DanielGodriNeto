name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: DanielGodriNeto
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_ignored: explorer, gister, helper
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # Licenças e Linhas
          plugin_lines: yes
          plugin_licenses: yes
          plugin_licenses_setup: yes
          plugin_licenses_ratio: yes

          # Idiomas/Linguagens
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Desativado o StackOverflow dele para não misturar dados
          plugin_stackoverflow: no

          # Issues e PRs
          plugin_followup: yes
          plugin_followup_indepth: yes
          plugin_followup_sections: user, repositories

          # Tráfego
          plugin_traffic: yes
          plugin_isocalendar: no
