name: CS2 stats card

on:
  push:
    branches:
      - main
    paths:
      - "cs2-stats.json"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Render card
        run: python .github/scripts/render_cs2_card.py cs2-stats.json cs2-card.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cs2-card.svg
          git diff --cached --quiet || git commit -m "Update CS2 stats card"
          git push
